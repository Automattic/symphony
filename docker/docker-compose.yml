services:
  symphony:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SYMPHONY_UID: ${SYMPHONY_UID:-1000}
        SYMPHONY_GID: ${SYMPHONY_GID:-1000}
    image: symphony:local
    command:
      - --logs-root
      - /workspace/logs
      - --state-root
      - /workspace/state
      - --host
      - 0.0.0.0
      - --port
      - "4000"
      - --config
      - /workspace/symphony.yml
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GH_TOKEN: ${GH_TOKEN:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      LINEAR_API_KEY: ${LINEAR_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SYMPHONY_ALLOW_REMOTE_BIND: "1"
    volumes:
      - type: bind
        source: ${SYMPHONY_CONFIG:?Set SYMPHONY_CONFIG in your .env}
        target: /workspace/symphony.yml
        read_only: true
      - type: bind
        source: ${SYMPHONY_REPOS_ROOT:?Set SYMPHONY_REPOS_ROOT in your .env}
        target: /workspace/repos
      - type: bind
        source: ${HOME}/.codex
        target: /home/symphony/.codex
      - type: bind
        source: ${HOME}/.claude
        target: /home/symphony/.claude
      - type: bind
        source: ${HOME}/.ssh
        target: /home/symphony/.ssh
        read_only: true
      - type: volume
        source: symphony-logs
        target: /workspace/logs
      - type: volume
        source: symphony-state
        target: /workspace/state
      - type: volume
        source: symphony-workspaces
        target: /workspace/workspaces

volumes:
  symphony-logs:
  symphony-state:
  symphony-workspaces:
