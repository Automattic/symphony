tracker:
  kind: linear
  assignee: me
  active_states:
    - Todo
    - In Progress
    - Merging
    - Rework
  terminal_states:
    - Closed
    - Cancelled
    - Canceled
    - Duplicate
    - Done
repos:
  - name: symphony
    projects: ["building-the-harness-ai-agents-that-ship-production-code-safely-f469eb38bbc5"]
    workflow: WORKFLOW.md
    workspace:
      strategy: worktree
      repo: ~/Projects/symphony
      fetch_before_dispatch: true
workspace:
  root: ~/Projects/symphony-workspaces
  lifecycle:
    max_age_days: 14
    gc_interval_ms: 3600000
    orphan_action: log
    trash_dir: .trash
agent:
  kind: claude
  command: claude --model claude-opus-4-7 --dangerously-skip-permissions
  max_concurrent_agents: 10
  max_turns: 20
  max_tokens_per_issue: 100000000
  max_tokens_per_day: 1000000000
  network_access:
    mode: allowlist
polling:
  interval_ms: 5000
pr_review:
  mode: polling
ci:
  enabled: true
  poll_interval_ms: 30000
  log_excerpt_lines: 200
  flaky_retry: true
  max_retries: 3
  escalation_state: In Review
quality_gate:
  enabled: true
  provider: anthropic
  model: claude-haiku-4-5-20251001
  pass_threshold: 6
  clarification_floor: 4
  max_clarification_rounds: 2
  on_error: pass
learnings:
  enabled: true
  provider: anthropic
  model: claude-haiku-4-5-20251001
  max_total_per_repo: 500
  max_per_run: 3
self_review:
  enabled: true
  provider: anthropic
  model: claude-sonnet-4-6
  diff_max_lines: 600
  max_rounds: 1
watchdog:
  enabled: true
  tick_interval_ms: 60000
  no_progress_threshold_ms: 600000
observability:
  transcript_buffer_size: 200
notifications:
  enabled: false
  channels:
    - kind: slack
      webhook_url: $SLACK_WEBHOOK_URL
      events: [pr_opened, awaiting_review, run_failed, issue_completed, budget_exceeded, dependency_pending_approval, reviewer_commented, rework_pushed, ci_failed, ci_escalated]
