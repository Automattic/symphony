# Symphony operator config — Claude runner.
# See docs/configuration.md for the full reference. Every valid block is
# represented below; commented values show the schema default.

tracker:
  kind: linear
  # endpoint: https://api.linear.app/graphql # Linear API endpoint override.
  # api_key: $LINEAR_API_KEY                 # Defaults to LINEAR_API_KEY in env.
  # project_slug: my-project                 # Global Linear project slug when repos do not set projects.
  # team: ENG                                # Global Linear team key or ID.
  # labels: [claude]                         # Global Linear labels; repo labels add tighter routing.
  assignee: me
  active_states:
    - Todo
    - In Progress
    - Merging
    - Rework
  terminal_states:
    - Closed
    - Cancelled
    - Canceled
    - Duplicate
    - Done
    - Won't Do

repos:
  - name: symphony
    # default: true                          # Fallback repo when an issue does not match another repo route.
    # path: ~/Projects/symphony              # Legacy base path for resolving workflow.
    # base_branch: main                      # Self-review comparison branch; defaults to origin/HEAD or origin/main.
    # team: ENG                              # Repo-level Linear team selector.
    # labels: [backend]                      # Repo-level Linear label selector.
    # assignee: me                           # Repo-level Linear assignee selector.
    projects: ["building-the-harness-ai-agents-that-ship-production-code-safely-f469eb38bbc5"]
    workflow: WORKFLOW.md
    workspace:
      strategy: worktree                     # clone | worktree
      repo: ~/Projects/symphony              # Primary clone path when strategy: worktree.
      fetch_before_dispatch: true

workspace:
  root: ~/Projects/symphony-workspaces
  # strategy: clone                          # Global default: clone or worktree. Prefer per-repo workspace for multi-repo configs.
  # repo: ~/Projects/symphony                # Required only when a global worktree strategy is used.
  # fetch_before_dispatch: true              # Fetch origin before each worktree dispatch.
  # sandbox:
  #   allow_read_paths: []                   # NOTE: Codex-effective only — current Claude adapter does not pass these through.
  # attachments:
  #   allowed_hosts: [github.com]            # Hosts trusted for issue attachment downloads.
  #   public_upload_extensions: [.png, .jpg, .jpeg, .gif, .webp, .svg, .pdf]
  lifecycle:
    # age_gc_enabled: true                   # Remove old local workspaces on the cleanup interval.
    max_age_days: 14
    gc_interval_ms: 3600000
    # min_free_bytes: 10737418240            # Pause new dispatch when workspace storage drops below this.
    orphan_action: log                       # log | delete | trash
    trash_dir: .trash

# worker:
#   ssh_hosts: []                            # SSH worker hosts, for example devbox-01 or devbox-01:2222.
#   max_concurrent_agents_per_host: 2        # Per-host dispatch cap.

# github:
#   enterprise_hosts: []                     # GitHub Enterprise hosts accepted in repo and PR URLs.
#   failed_run_log_max_bytes: 65536          # Cap on the failed-step log excerpt returned via the MCP tool.

agent:
  kind: claude
  command: claude --model claude-opus-4-7 --dangerously-skip-permissions
  max_concurrent_agents: 10
  # max_concurrent_agents_by_state:
  #   rework: 2                              # Per-Linear-state concurrency override.
  max_turns: 20
  # max_retry_backoff_ms: 300000             # Maximum retry delay after failed runs.
  max_tokens_per_issue: 100000000            # null disables this cap. NOTE: Claude usage events are best-effort today.
  max_tokens_per_day: 1000000000             # null disables this cap.

  # Codex-only sandbox knobs (commented because agent.kind: claude does not use them) -----
  # approval_policy: auto_approve_all        # Codex only.
  # thread_sandbox: workspace-write          # Codex only.
  # turn_sandbox_policy:                     # Codex only.
  #   type: workspaceWrite
  #   networkAccess: true
  # sandbox_runtime:                         # Codex only; rejected with kind=srt for Claude.
  #   kind: none
  #   command: srt
  #   enable_weaker_network_isolation: false

  # Network policy -------------------------------------------------------------
  network_access:
    mode: allowlist                          # allowlist | open | block. Drives Codex sandbox switch; for Claude declare network in the command.
    # allowed_domains: []                    # Extra domains agents may reach in allowlist mode.
    # denied_domains: []                     # Domains blocked even if built in or allowed above.

  # MCP plumbing ---------------------------------------------------------------
  mcp:
    inherit: none                            # none | allowlist (Claude). "all" is rejected for Claude.
    # allowed_servers: [playwright]          # Required (non-empty) when inherit: allowlist. Claude reads only ~/.claude.json top-level mcpServers.
    # servers: {}                            # Map of name → declaration. Reserved name: symphony.
    #   filesystem:
    #     transport: stdio                   # stdio | http | sse — http/sse + codex in runtimes is rejected.
    #     command: npx
    #     args: ["-y", "@modelcontextprotocol/server-filesystem", "/Users/me/Projects"]
    #     env: {}                            # $VAR resolves from orchestrator env at config-load time.
    #     runtimes: [claude]                 # Restrict to a subset of [claude, codex].
    #   docs:
    #     transport: http
    #     url: https://docs.example/mcp
    #     headers:
    #       Authorization: $DOCS_MCP_BEARER
    #     runtimes: [claude]                 # http/sse must not include codex.

  # Timeouts -------------------------------------------------------------------
  # turn_timeout_ms: 3600000                 # Maximum time for one agent turn.
  # read_timeout_ms: 5000                    # App-server response read timeout.
  # stall_timeout_ms: 300000                 # No-progress timeout before retry handling.
  # command_timeout_ms: 600000               # Maximum time for one shell command; 0 disables this guard.

review_agent:
  enabled: true                           # Two-agent run shape (executor + reviewer).
  kind: codex                             # codex | claude
  command: codex app-server
  max_iterations: 1                        # Allowed request_changes correction passes.

polling:
  interval_ms: 5000

pr_review:
  mode: polling                              # tracker (default) | polling
  # cooldown_minutes: 10                     # Polling: wait before responding to review comments.
  # stale_days: 7                            # Polling: stop watching closed or idle PRs after this many days.
  # github_user: your-github-user            # Polling: current operator user, used for review filtering.
  # bot_users: []                            # Polling: GitHub users ignored as bot reviewers.
  # auto_reply: false                        # Polling: reply to addressed review comments.
  # auto_request_review: false               # Polling: request another review after pushing rework.

ci:
  enabled: true                              # Requires pr_review.mode: polling.
  poll_interval_ms: 30000                    # Falls back to polling.interval_ms when omitted.
  log_excerpt_lines: 200
  flaky_retry: true
  max_retries: 3
  escalation_state: In Review

# verification:
#   enabled: false                           # Dev-server verification before agent turns.
#   port_allocation:
#     range: [4000, 4099]                    # Ports exposed as SYMPHONY_VERIFICATION_PORT.
#   dev_server:                              # Usually better in the repo's WORKFLOW.md.
#     start_cmd: "pnpm dev --port $SYMPHONY_VERIFICATION_PORT"
#     health_check_url: "http://localhost:${SYMPHONY_VERIFICATION_PORT}/healthz"
#     health_timeout_ms: 30000
#     stop_signal: TERM                      # TERM | INT | QUIT | HUP | KILL
#     stop_timeout_ms: 10000

# server:
#   host: 127.0.0.1                          # Dashboard host; CLI --host overrides.
#   port: 0                                  # 0 = ephemeral; CLI --port overrides.

quality_gate:
  enabled: false
  provider: anthropic                        # anthropic | openai
  model: claude-haiku-4-5-20251001
  pass_threshold: 6                          # 1-10; scores >= this dispatch.
  clarification_floor: 4                     # 1-(pass_threshold-1); scores in band ask for clarification.
  max_clarification_rounds: 2
  # min_score: 6                             # Legacy alias used only when pass_threshold is unset.
  on_error: pass                             # pass dispatches on scorer failure; skip retries later.

self_review:
  enabled: false                             # Pre-push LLM review of committed diff vs base_branch.
  provider: anthropic                        # anthropic | openai
  model: claude-sonnet-4-6

learnings:
  enabled: false                             # Requires pr_review.mode: polling.
  provider: anthropic                        # anthropic | openai
  model: claude-haiku-4-5-20251001
  max_total_per_repo: 500
  max_per_run: 3                             # 0-3 inclusive.

watchdog:
  enabled: true
  tick_interval_ms: 60000
  no_progress_threshold_ms: 600000

observability:
  # dashboard_enabled: true                  # Start the local dashboard unless disabled.
  # refresh_ms: 1000                         # Dashboard polling interval.
  # render_interval_ms: 16                   # Transcript rendering throttle.
  transcript_buffer_size: 200

# dependencies:
#   allow_registries: []                     # Extra package registries trusted by the dependency audit.
#   allow_git_sources: []                    # Extra git dependency sources trusted by the dependency audit.
#   allow_path_sources: []                   # Extra local path dependency sources trusted by the dependency audit.

notifications:
  enabled: false
  # redact_titles: false                     # Hide issue and PR titles in outgoing notifications.
  channels:
    - kind: slack
      webhook_url: $SLACK_WEBHOOK_URL
      # Supported events: pr_opened, awaiting_review, run_failed, issue_completed,
      # budget_exceeded, dependency_pending_approval, reviewer_commented,
      # rework_pushed, ci_failed, ci_escalated.
      events: [pr_opened, awaiting_review, run_failed, budget_exceeded]
    # - kind: webhook
    #   url: $NOTIFY_WEBHOOK_URL
    #   allow_private: false                 # Set true only for trusted private/internal webhook hosts.
    #   events: [run_failed, ci_failed]
    #   headers:
    #     Authorization: $NOTIFY_AUTH_HEADER
