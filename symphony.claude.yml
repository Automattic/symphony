# Symphony operator config - Claude runner.
# See docs/configuration.md for the full reference. Commented values show defaults
# or optional advanced knobs.

issues:
  provider: linear
  poll_interval_ms: 5000
  linear:
    # endpoint: https://api.linear.app/graphql
    # api_key: $LINEAR_API_KEY
    assignee: me
    scope:
      # project_slug: my-project
      # team: ENG
      # labels: [claude]
  states:
    active: [Todo, In Progress, Merging, Rework]
    terminal: [Closed, Cancelled, Canceled, Duplicate, Done, "Won't Do"]

repositories:
  - key: symphony
    # default: true
    # base_branch: main
    workflow: WORKFLOW.md
    route:
      # team: ENG
      # labels: [backend]
      # assignee: me
      projects: ["building-the-harness-ai-agents-that-ship-production-code-safely-f469eb38bbc5"]
    workspace:
      strategy: worktree
      repo: ~/Projects/symphony
      fetch_before_dispatch: true

workspaces:
  root: ~/Projects/symphony-workspaces
  cleanup:
    max_age_days: 14
    interval_ms: 3600000
    orphan_action: log
    trash_dir: .trash

agent:
  runtime: claude
  command: claude --model claude-opus-4-7 --dangerously-skip-permissions
  concurrency:
    max_total: 10
  limits:
    max_turns: 20
    retry_backoff_max_ms: 300000
    tokens_per_issue: 100000000
    tokens_per_day: 1000000000
  permissions:
    network:
      mode: allowlist
  mcp:
    inherit: none
  timeouts:
    # turn_ms: 3600000
    # read_ms: 5000
    # stall_ms: 300000
    # command_ms: 600000

pre_push_review:
  enabled: true
  runtime: codex
  command: codex app-server
  max_iterations: 1

pull_requests:
  enabled: true
  poll_interval_ms: 30000
  review_comments:
    rework_delay_minutes: 1
    reply_after_addressing: true
  checks:
    enabled: true
    log_excerpt_lines: 200
    retry_failed_once: true
    max_fix_attempts: 3
    escalate_to_state: In Review
  learnings:
    enabled: false
    provider: anthropic
    model: claude-haiku-4-5-20251001
    max_total_per_repo: 500
    max_per_run: 3

dashboard:
  transcript_buffer_size: 300

issue_gate:
  enabled: false
  provider: anthropic
  model: claude-haiku-4-5-20251001
  pass_threshold: 6
  clarification_floor: 4
  max_clarification_rounds: 2
  on_error: pass

watchdog:
  enabled: true
  tick_interval_ms: 60000
  no_progress_threshold_ms: 600000

notifications:
  enabled: false
  channels:
    - kind: slack
      webhook_url: $SLACK_WEBHOOK_URL
      events: [pr_opened, awaiting_review, run_failed, budget_exceeded]
