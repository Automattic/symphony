# Symphony operator config - Codex runner.
# See docs/configuration.md for the full reference. Commented values show defaults
# or optional advanced knobs.

issues:
  provider: linear
  poll_interval_ms: 15000
  linear:
    # endpoint: https://api.linear.app/graphql
    # api_key: $LINEAR_API_KEY
    assignee: me
    scope:
      # project_slug: my-project
      # team: ENG
      # labels: [codex]
  states:
    active: [Todo, In Progress, Merging, Rework]
    terminal: [Closed, Cancelled, Canceled, Duplicate, Done, "Won't Do"]

repositories:
  - key: symphony
    # default: true
    # base_branch: main
    workflow: WORKFLOW.md
    route:
      # team: ENG
      # labels: [backend]
      # assignee: me
      projects: ["building-the-harness-ai-agents-that-ship-production-code-safely-f469eb38bbc5"]
    workspace:
      strategy: worktree
      repo: ~/Projects/symphony
      fetch_before_dispatch: true

workspaces:
  root: ~/Projects/symphony-workspaces
  # strategy: clone
  # repo: ~/Projects/symphony
  # fetch_before_dispatch: true
  # attachments:
  #   allowed_hosts: [github.com]
  #   public_upload_extensions: [.png, .jpg, .jpeg, .gif, .webp, .svg, .pdf]
  cleanup:
    # enabled: true
    max_age_days: 14
    interval_ms: 3600000
    # min_free_bytes: 10737418240
    orphan_action: log
    trash_dir: .trash

# workers:
#   ssh_hosts: []
#   max_concurrent_agents_per_host: 2

# github:
#   enterprise_hosts: []
#   failed_run_log_max_bytes: 65536

agent:
  runtime: codex
  command: codex --config shell_environment_policy.inherit=all --config 'model="gpt-5.5"' --config model_reasoning_effort=high app-server
  concurrency:
    max_total: 10
    # max_by_issue_state:
    #   rework: 2
  limits:
    max_turns: 8
    retry_backoff_max_ms: 300000
    tokens_per_issue: 100000000
    tokens_per_day: 1000000000
  prompts:
    # include_project_guides: true
    # project_guide_files:
  permissions:
    approval_policy: auto_approve_all
    filesystem:
      sandbox: workspace-write
      turn_policy:
        type: workspaceWrite
        networkAccess: true
        # writableRoots: []
      # allow_read_paths: []
    network:
      mode: allowlist
      # allowed_domains: []
      # denied_domains: []
    outer_sandbox:
      # runtime: srt
      command: srt
      enable_weaker_network_isolation: false
  mcp:
    inherit: none
    # allowed_servers: []
    # servers: {}
  timeouts:
    # turn_ms: 3600000
    # read_ms: 30000
    # stall_ms: 300000
    # command_ms: 600000

pre_push_review:
  enabled: true
  runtime: claude
  command: claude --model claude-opus-4-7 --dangerously-skip-permissions
  max_iterations: 1
  run_on: first_push

pull_requests:
  enabled: true
  poll_interval_ms: 30000
  review_comments:
    rework_delay_minutes: 1
    # stale_after_days: 7
    # ignored_reviewers: []
    reply_after_addressing: true
    # request_review_after_push: false
  checks:
    enabled: true
    log_excerpt_lines: 200
    retry_failed_once: true
    max_fix_attempts: 3
    escalate_to_state: In Review
  # learnings:
  #   enabled: false
  #   provider: anthropic
  #   model: claude-haiku-4-5-20251001
  #   max_total_per_repo: 500
  #   max_per_run: 3

# verification:
#   enabled: false
#   port_allocation:
#     range: [4000, 4099]
#   dev_server:
#     start_cmd: "pnpm dev --port $SYMPHONY_VERIFICATION_PORT"
#     health_check_url: "http://localhost:${SYMPHONY_VERIFICATION_PORT}/healthz"
#     health_timeout_ms: 30000
#     stop_signal: TERM
#     stop_timeout_ms: 10000

dashboard:
  # enabled: true
  # host: 127.0.0.1
  # port: 0
  # refresh_ms: 1000
  # render_interval_ms: 16
  # snapshot_publish_ms: 500
  transcript_buffer_size: 200

issue_gate:
  enabled: false
  provider: anthropic
  model: claude-haiku-4-5-20251001
  pass_threshold: 6
  clarification_floor: 4
  max_clarification_rounds: 2
  on_error: pass

watchdog:
  enabled: true
  tick_interval_ms: 60000
  no_progress_threshold_ms: 600000

# dependency_audit:
#   allow_registries: []
#   allow_git_sources: []
#   allow_path_sources: []

notifications:
  enabled: true
  # redact_titles: false
  channels:
    - kind: slack
      webhook_url: $SLACK_WEBHOOK_URL
      events: [pr_opened, awaiting_review, run_failed, budget_exceeded]
    # - kind: webhook
    #   url: $NOTIFY_WEBHOOK_URL
    #   allow_private: false
    #   events: [run_failed, ci_failed]
