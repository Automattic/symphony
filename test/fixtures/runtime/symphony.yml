issues:
  provider: memory
repositories:
  - key: runtime-test
    default: true
    workflow: WORKFLOW.md
workspaces:
  root: /tmp/symphony-elixir-runtime-test-workspaces
agent:
  runtime: codex
  command: codex app-server
  concurrency:
    max_total: 1
pull_requests:
  enabled: false
  checks:
    enabled: false
issue_gate:
  enabled: false
watchdog:
  enabled: false
notifications:
  enabled: false
